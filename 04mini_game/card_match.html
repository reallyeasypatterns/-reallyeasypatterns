<script>
let currentStage = 1; 
let timeLeft = 90;
let wrongCount = 0;
let timerInterval = null;
let isGameOver = false;
let isBridgeActive = false;
let isChecking = false; 
let isPreviewMode = false; // 미리보기 선행 암기 모드 구분 플래그
let currentTopPercent = "0.0";

let selectedCards = []; 
let matchedPairs = 0; 
let totalPairsNeeded = 2; 

const emojiPool = ["🍎", "🐯", "🍇", "🍌", "🚗", "✈️", "🐻", "🐟", "⚽", "🍦", "🎁", "🎈"];

const cardBoard = document.getElementById('card_board');
const stageTitleDisplay = document.getElementById('stage_title');
const timerDisplay = document.getElementById('timer');
const questionGuide = document.getElementById('question_guide');
const bridgeScreen = document.getElementById('bridge_screen');
const bridgeTitle = document.getElementById('bridge_title');
const bridgeDesc = document.getElementById('bridge_desc');
const resultScreen = document.getElementById('result_screen');
const resultMsg = document.getElementById('result_msg');
const successForm = document.getElementById('success_form');
const recordsList = document.getElementById('records_list');

// 단계별 미리보기 암기 지정 시간 설정 객체
const previewTimes = { 1: 2, 2: 4, 3: 6, 4: 10 };

function startGame() {
  currentStage = 1;
  timeLeft = 180;
  wrongCount = 0;
  isGameOver = false;
  isBridgeActive = false;
  isChecking = false;
  isPreviewMode = true;
  
  stageTitleDisplay.textContent = "1단계";
  timerDisplay.textContent = timeLeft;
  
  resultScreen.classList.add('hidden');
  successForm.classList.add('hidden');
  bridgeScreen.classList.add('hidden');
  
  document.getElementById('nickname').value = '';
  document.getElementById('comment').value = '';
  
  clearInterval(timerInterval);
  buildBoard();
}

function buildBoard() {
  if (isGameOver) return;

  cardBoard.innerHTML = '';
  selectedCards = [];
  matchedPairs = 0;
  isChecking = false;
  isPreviewMode = true;

  let cols = 2;
  let rows = 2;

  if (currentStage === 1) { cols = 2; rows = 2; totalPairsNeeded = 2; }
  else if (currentStage === 2) { cols = 4; rows = 3; totalPairsNeeded = 6; }
  else if (currentStage === 3) { cols = 4; rows = 4; totalPairsNeeded = 8; }
  else if (currentStage === 4) { cols = 4; rows = 6; totalPairsNeeded = 12; }

  cardBoard.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  let currentStageEmojis = [];
  for (let i = 0; i < totalPairsNeeded; i++) {
    currentStageEmojis.push(emojiPool[i]);
    currentStageEmojis.push(emojiPool[i]);
  }

  currentStageEmojis.sort(() => Math.random() - 0.5);

  currentStageEmojis.forEach((emoji, idx) => {
    const card = document.createElement('div');
    card.classList.add('card_item', 'flipped'); // 최초 생성 시 flipped 추가하여 앞면(그림) 노출
    card.dataset.emoji = emoji;

    const inner = document.createElement('div');
    inner.classList.add('card_inner');

    const front = document.createElement('div');
    front.classList.add('card_front');
    front.textContent = emoji;

    const back = document.createElement('div');
    back.classList.add('card_back');
    back.textContent = "❓";

    inner.appendChild(front);
    inner.appendChild(back);
    card.appendChild(inner);

    card.onclick = () => {
      if (isGameOver || isBridgeActive || isChecking || isPreviewMode) return;
      if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

      card.classList.add('flipped');
      selectedCards.push(card);

      if (selectedCards.length === 2) {
        checkMatch();
      }
    };

    cardBoard.appendChild(card);
  });

  runPreviewCountdown();
}

function runPreviewCountdown() {
  let pTime = previewTimes[currentStage];
  questionGuide.innerHTML = `👀 <strong>[보고 기억하세요!]</strong> 그림 위치 기억까지 <span style='color:#ffeb3b;'>${pTime}초</span> 남음`;

  let previewInterval = setInterval(() => {
    pTime--;
    if (pTime > 0) {
      questionGuide.innerHTML = `👀 <strong>[보고 기억하세요!]</strong> 그림 위치 기억까지 <span style='color:#ffeb3b;'>${pTime}초</span> 남음`;
    } else {
      clearInterval(previewInterval);
      isPreviewMode = false;
      questionGuide.textContent = "💡 카드를 뒤집어 같은 그림의 짝을 찾으세요!";
      
      // 암기 종료 후 전체 카드를 3D 효과로 뒷면 뒤집기
      const cards = document.querySelectorAll('.card_item');
      cards.forEach(c => c.classList.remove('flipped'));

      // 이제 본 임무 게임 타이머 구동 시작
      startMainTimer();
    }
  }, 1000);
}

function startMainTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (isGameOver || isBridgeActive || isPreviewMode) return;
    timeLeft--;
    timerDisplay.textContent = timeLeft;
    if (timeLeft <= 0) endGame('timeout');
  }, 1000);
}

function checkMatch() {
  isChecking = true;

  const [card1, card2] = selectedCards;

  if (card1.dataset.emoji === card2.dataset.emoji) {

    card1.classList.add('matched');
    card2.classList.add('matched');

    matchedPairs++;
    selectedCards = [];
    isChecking = false;

    if (matchedPairs === totalPairsNeeded) {

      if (currentStage < 4) {
        showBridge();
      } else {
        endGame('success');
      }

    }

  } else {

    // 오답 횟수는 기록용으로만 증가
    wrongCount++;

    setTimeout(() => {
      card1.classList.remove('flipped');
      card2.classList.remove('flipped');
      selectedCards = [];
      isChecking = false;
    }, 850);

  }
}

function showBridge() {
  isBridgeActive = true;
  clearInterval(timerInterval);
  
  bridgeTitle.textContent = `🎉 ${currentStage}단계 통과 성공!`;
  let nextStageNum = currentStage + 1;
  let nextInfo = "";
  if (nextStageNum === 2) nextInfo = "2단계는 4x3 크기로 총 12장의 카드가 등장하며, 4초간 보여줍니다.";
  else if (nextStageNum === 3) nextInfo = "3단계는 4x4 크기로 총 16장의 카드가 등장하며, 6초간 보여줍니다.";
  else if (nextStageNum === 4) nextInfo = "마지막 4단계는 4x6 크기로 총 24장의 카드가 거대하게 늘어나며, 무려 10초간 보여줍니다!";

  bridgeDesc.innerHTML = `정말 대단한 기억력이십니다!<br>이제 <strong>${nextStageNum}단계</strong>에 도전합니다.<br><br>${nextInfo}`;
  bridgeScreen.classList.remove('hidden');

  const cards = document.querySelectorAll('.card_item');
  cards.forEach(c => c.classList.add('disabled'));
}

function startNextStage() {
  isBridgeActive = false;
  currentStage++;
  stageTitleDisplay.textContent = `${currentStage}단계`;
  bridgeScreen.classList.add('hidden');
  buildBoard();
}

function endGame(reason) {
  isGameOver = true;
  clearInterval(timerInterval);
  
  const cards = document.querySelectorAll('.card_item');
  cards.forEach(c => {
    c.classList.add('disabled');
    c.onclick = null;
  });
  
  resultScreen.classList.remove('hidden');

  if (reason === 'success') {
    currentTopPercent = Math.max(0.1, (100 - (timeLeft * 0.5)) - (wrongCount * 2)).toFixed(1);
    resultMsg.innerHTML = `🎉 축하합니다! 4단계까지 모든 그림 카드의 짝을 완벽히 맞췄습니다!<br>당신의 기록은 <strong>상위 ${currentTopPercent}%</strong> 입니다.`;
    successForm.classList.remove('hidden');
  } else if (reason === 'timeout') {
    resultMsg.textContent = "⏱️ 시간 초과! 실패했습니다.";
  } 
}

async function saveRecordToServer() {
  const btn = document.querySelector("#success_form button");
  if (btn.disabled) return;
  
  const nickname = document.getElementById('nickname').value.trim() || '익명';
  const comment = document.getElementById('comment').value.trim() || '성공했습니다!';
  
  const badWords = ["바보", "멍청이", "욕설단어1", "욕설단어2"]; 
  for (let word of badWords) {
    if (nickname.includes(word) || comment.includes(word)) {
      alert("부적절한 단어가 포함되어 있어 등록할 수 없습니다.");
      return;
    }
  }
  
  try {
    btn.disabled = true;
    btn.textContent = "등록 중...";

    await window.addDoc(window.collection(window.db, "cardMatchRecords"), {
      nickname: nickname,
      comment: comment,
      timeLeft: timeLeft,
      topPercent: currentTopPercent,
      createdAt: Date.now()
    });

    successForm.classList.add('hidden');
    resultMsg.innerHTML = "🏆 명예의 전당에 기록이 등록되었습니다!";
    loadRecordsFromServer();
  } catch (error) {
    console.error("등록 실패: ", error);
    btn.disabled = false;
    btn.textContent = "기록 등록하기";
    alert("기록 저장 중 오류가 발생했습니다.");
  }
}

async function loadRecordsFromServer() {
  try {
    const q = window.query(
      window.collection(window.db, "cardMatchRecords"), 
      window.orderBy("createdAt", "desc"), 
      window.limit(30)
    );
    
    const querySnapshot = await window.getDocs(q);
    
    if (querySnapshot.empty) {
      recordsList.innerHTML = '등록된 기록이 없습니다.<br> 성공하여 첫 댓글을 남겨보세요!';
      return;
    }

    let htmlBuffer = "";
    querySnapshot.forEach((doc) => {
      const item = doc.data();
      const dateFormatted = new Date(item.createdAt).toLocaleString('ko-KR', { hour12: false });
      
      htmlBuffer += `
        <div class="record_item">
          <strong>${item.nickname}</strong>: ${item.comment}
          <div class="record_meta">⏱️ 남은 시간: ${item.timeLeft}초 (상위 ${item.topPercent}%) | 📅 ${dateFormatted}</div>
        </div>
      `;
    });
    
    recordsList.innerHTML = htmlBuffer;
  } catch (error) {
    console.error("데이터 불러오기 실패: ", error);
    recordsList.innerHTML = "기록을 불러오는 중 오류가 발생했습니다. Firebase 설정을 확인해 주세요.";
  }
}

setTimeout(() => {
  loadRecordsFromServer();
}, 800);

startGame();
</script>
