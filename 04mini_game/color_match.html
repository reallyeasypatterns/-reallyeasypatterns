<div id="contents">
    <div class="wrap">
      <h2 class="m4">미니게임</h2>
      <p class="page_t_guide"><em>조작은 간단하게, 두뇌 자극은 확실하게!</em> 즐겁게 인지 능력을 키워보세요.</p>
      <div id="game_container">
        <h3>Color Match</h3>
        <div id="info_panel">
          <span>문항: <strong id="stage_num">1</strong>/30</span> | 
          <span>남은시간: <strong id="timer">150</strong>초</span> |

        <div id="records_list">불러오는 중...</div>
      </div>
    </div>
</div>

<script>
let stage = 1;
let timeLeft = 150;
let wrongCount = 0;
let timerInterval = null;
let gridSize = 2;
let colorDiff = 40;
let isGameOver = false;
let currentTopPercent = "0.0";

const board = document.getElementById('board');
const stageNumDisplay = document.getElementById('stage_num');
const timerDisplay = document.getElementById('timer');
const wrongCntDisplay = document.getElementById('wrong_cnt');
const resultScreen = document.getElementById('result_screen');
const resultMsg = document.getElementById('result_msg');
const successForm = document.getElementById('success_form');
const recordsList = document.getElementById('records_list');

function startGame() {
  stage = 1;
  timeLeft = 100;
  wrongCount = 0;
  isGameOver = false;
  
  stageNumDisplay.textContent = stage;
  timerDisplay.textContent = timeLeft;
  wrongCntDisplay.textContent = wrongCount;
  
  resultScreen.classList.add('hidden');
  successForm.classList.add('hidden');
  
  document.getElementById('nickname').value = '';
  document.getElementById('comment').value = '';
  
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (isGameOver) return;
    timeLeft--;
    timerDisplay.textContent = timeLeft;
    if (timeLeft <= 0) endGame('timeout');
  }, 1000);

  nextQuestion();
}

function nextQuestion() {
  if (isGameOver) return;
  if (stage > 30) {
    endGame('success');
    return;
  }

  stageNumDisplay.textContent = stage;
  
  gridSize = 2 + Math.floor((stage - 1) / 10); 
  colorDiff = Math.max(22, 45 - Math.floor((stage - 1) / 2) * 2); 

  board.innerHTML = '';
  board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

  const r = Math.floor(Math.random() * (255 - colorDiff));
  const g = Math.floor(Math.random() * (255 - colorDiff));
  const b = Math.floor(Math.random() * (255 - colorDiff));
  
  const baseColor = `rgb(${r}, ${g}, ${b})`;
  const targetColor = `rgb(${r + colorDiff}, ${g + colorDiff}, ${b + colorDiff})`;

  const totalCells = gridSize * gridSize;
  const targetIndex = Math.floor(Math.random() * totalCells);

  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div');
    cell.classList.add('cell');
    
    if (i === targetIndex) {
      cell.style.backgroundColor = targetColor;
      cell.onclick = () => {
        if (isGameOver) return;
        stage++;
        nextQuestion();
      };
    } else {
      cell.style.backgroundColor = baseColor;
      cell.onclick = () => {
        if (isGameOver) return;
        wrongCount++;
        wrongCount = Math.min(wrongCount, 5);
        wrongCntDisplay.textContent = wrongCount;
        if (wrongCount >= 5) endGame('wrong_limit');
      };
    }
    board.appendChild(cell);
  }
}

function endGame(reason) {
  isGameOver = true;
  clearInterval(timerInterval);
  
  // 숨기지 않는 대신 모든 셀의 작동을 차단하고 흐리게 연출
  const cells = document.querySelectorAll('.cell');
  cells.forEach(cell => {
    cell.classList.add('disabled');
    cell.onclick = null; // 클릭 이벤트 완전 제거
  });
  
  resultScreen.classList.remove('hidden');

  if (reason === 'success') {
    currentTopPercent = Math.max(0.1, (100 - (timeLeft * 0.6))).toFixed(1);
    resultMsg.innerHTML = `🎉 축하합니다! 30문제를 모두 맞췄습니다!<br>당신의 기록은 <strong>상위 ${currentTopPercent}%</strong> 입니다.`;
    successForm.classList.remove('hidden');
  } else if (reason === 'timeout') {
    resultMsg.textContent = "⏱️ 시간 초과! 실패했습니다.";
  } else if (reason === 'wrong_limit') {
    resultMsg.textContent = "❌ 오답 횟수 초과(5회)! 실패했습니다.";
  }
}

async function saveRecordToServer() {
  const btn = document.querySelector("#success_form button");
  if (btn.disabled) return;
  
  const nickname = document.getElementById('nickname').value.trim() || '익명';
  const comment = document.getElementById('comment').value.trim() || '성공했습니다!';
  
  const badWords = ["바보", "멍청이", "욕설단어1", "욕설단어2"]; 
  for (let word of badWords) {
    if (nickname.includes(word) || comment.includes(word)) {
      alert("부적절한 단어가 포함되어 있어 등록할 수 없습니다.");
      return;
    }
  }
  
  try {
    btn.disabled = true;
    btn.textContent = "등록 중...";

    await window.addDoc(window.collection(window.db, "colorGameRecords"), {
      nickname: nickname,
      comment: comment,
      timeLeft: timeLeft,
      topPercent: currentTopPercent,
      createdAt: Date.now()
    });

    successForm.classList.add('hidden');
    resultMsg.innerHTML = "🏆 명예의 전당에 기록이 등록되었습니다!";
    loadRecordsFromServer();
  } catch (error) {
    console.error("등록 실패: ", error);
    btn.disabled = false;
    btn.textContent = "기록 등록하기";
    alert("기록 저장 중 오류가 발생했습니다.");
  }
}

async function loadRecordsFromServer() {
  try {
    const q = window.query(
      window.collection(window.db, "colorGameRecords"), 
      window.orderBy("createdAt", "desc"), 
      window.limit(30)
    );
    
    const querySnapshot = await window.getDocs(q);
    
    if (querySnapshot.empty) {
      recordsList.innerHTML = '등록된 기록이 없습니다.<br> 성공하여 첫 댓글을 남겨보세요!';
      return;
    }

    let htmlBuffer = "";
    querySnapshot.forEach((doc) => {
      const item = doc.data();
      const dateFormatted = new Date(item.createdAt).toLocaleString('ko-KR', { hour12: false });
      
      htmlBuffer += `
        <div class="record_item">
          <strong>${item.nickname}</strong>: ${item.comment}
          <div class="record_meta">⏱️ 남은 시간: ${item.timeLeft}초 (상위 ${item.topPercent}%) | 📅 ${dateFormatted}</div>
        </div>
      `;
    });
    
    recordsList.innerHTML = htmlBuffer;
  } catch (error) {
    console.error("데이터 불러오기 실패: ", error);
    recordsList.innerHTML = "기록을 불러오는 중 오류가 발생했습니다. Firebase 설정을 확인해 주세요.";
  }
}

setTimeout(() => {
  loadRecordsFromServer();
}, 800);

startGame();
</script>
