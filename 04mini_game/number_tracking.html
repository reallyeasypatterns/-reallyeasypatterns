<script>
let currentStage = 1; // 1: 1단계, 2: 2단계
let currentTargetNumber = 1; // 현재 찾아야 할 숫자 타겟
let maxNumber = 12; // 단계별 최대 숫자 (1단계: 12, 2단계: 25)
let timeLeft = 100;
let wrongCount = 0;
let timerInterval = null;
let isGameOver = false;
let isBridgeActive = false;
let currentTopPercent = "0.0";

// 시각적 가시성을 위한 어르신 맞춤형 고대비 배경 컬러 색상 리스트
const buttonColors = ["rgb(73, 145, 242)", "rgb(242, 95, 102)", "rgb(39, 174, 96)", "rgb(242, 201, 76)", "rgb(155, 89, 182)"];

const numberBoard = document.getElementById('number_board');
const stageTitleDisplay = document.getElementById('stage_title');
const timerDisplay = document.getElementById('timer');
const wrongCntDisplay = document.getElementById('wrong_cnt');
const bridgeScreen = document.getElementById('bridge_screen');
const resultScreen = document.getElementById('result_screen');
const resultMsg = document.getElementById('result_msg');
const successForm = document.getElementById('success_form');
const recordsList = document.getElementById('records_list');

function startGame() {
  currentStage = 1;
  currentTargetNumber = 1;
  maxNumber = 12;
  timeLeft = 90;
  wrongCount = 0;
  isGameOver = false;
  isBridgeActive = false;
  
  stageTitleDisplay.textContent = "1단계";
  timerDisplay.textContent = timeLeft;
  wrongCntDisplay.textContent = wrongCount;
  
  resultScreen.classList.add('hidden');
  successForm.classList.add('hidden');
  bridgeScreen.classList.add('hidden');
  
  document.getElementById('nickname').value = '';
  document.getElementById('comment').value = '';
  
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (isGameOver || isBridgeActive) return;
    timeLeft--;
    timerDisplay.textContent = timeLeft;
    if (timeLeft <= 0) endGame('timeout');
  }, 1000);

  buildBoard();
}

function buildBoard() {
  if (isGameOver) return;

  numberBoard.innerHTML = '';
  
  // 단계별 격자(Grid) 구조 및 최대값 분기 생성
  if (currentStage === 1) {
    maxNumber = 12;
    numberBoard.style.gridTemplateColumns = `repeat(3, 1fr)`;
  } else {
    maxNumber = 25;
    numberBoard.style.gridTemplateColumns = `repeat(5, 1fr)`;
  }

  // 숫자 배열 생성 및 랜덤 셔플(Shuffle)
  let numberArray = [];
  for (let i = 1; i <= maxNumber; i++) {
    numberArray.push(i);
  }
  numberArray.sort(() => Math.random() - 0.5);

  // 동적 버튼 인스턴스 배치 생성
  numberArray.forEach((num) => {
    const btn = document.createElement('button');
    btn.classList.add('num_btn');
    btn.textContent = num;
    
    // 심심하지 않도록 숫자 버튼마다 무작위 소프트 컬러 바인딩
    btn.style.backgroundColor = buttonColors[num % buttonColors.length];

    btn.onclick = () => {
      if (isGameOver || isBridgeActive) return;
      if (btn.classList.contains('cleared')) return;

      // 올바른 순서의 숫자를 터치했을 경우
      if (num === currentTargetNumber) {
        btn.classList.add('cleared');
        currentTargetNumber++;

        // 현재 단계의 마지막 숫자까지 다 찾았을 경우
        if (currentTargetNumber > maxNumber) {
          if (currentStage === 1) {
            showBridge();
          } else {
            endGame('success');
          }
        }
      } else {
        // 잘못된 순서의 숫자를 터치했을 경우 오답 처리
        wrongCount++;
        wrongCount = Math.min(wrongCount, 3);
        wrongCntDisplay.textContent = wrongCount;
        if (wrongCount >= 3) endGame('wrong_limit');
      }
    };

    numberBoard.appendChild(btn);
  });
}

function showBridge() {
  isBridgeActive = true;
  bridgeScreen.classList.remove('hidden');
  // 화면 유지 보장을 위해 버튼들만 작동 비활성화
  const btns = document.querySelectorAll('.num_btn');
  btns.forEach(b => b.classList.add('disabled'));
}

function startStage2() {
  isBridgeActive = false;
  currentStage = 2;
  currentTargetNumber = 1;
  stageTitleDisplay.textContent = "2단계";
  bridgeScreen.classList.add('hidden');
  buildBoard();
}

function endGame(reason) {
  isGameOver = true;
  clearInterval(timerInterval);
  
  // 직전 화면 완벽 보존을 위해 클릭만 완전 차단 처리
  const btns = document.querySelectorAll('.num_btn');
  btns.forEach(b => {
    b.classList.add('disabled');
    b.onclick = null;
  });
  
  resultScreen.classList.remove('hidden');

  if (reason === 'success') {
    currentTopPercent = Math.max(0.1, (100 - (timeLeft * 0.75))).toFixed(1);
    resultMsg.innerHTML = `🎉 축하합니다! 모든 숫자를 순서대로 연결했습니다!<br>당신의 기록은 <strong>상위 ${currentTopPercent}%</strong> 입니다.`;
    successForm.classList.remove('hidden');
  } else if (reason === 'timeout') {
    resultMsg.textContent = "⏱️ 시간 초과! 실패했습니다.";
  } else if (reason === 'wrong_limit') {
    resultMsg.textContent = "❌ 오답 횟수 초과(3회)! 실패했습니다.";
  }
}

async function saveRecordToServer() {
  const btn = document.querySelector("#success_form button");
  if (btn.disabled) return;
  
  const nickname = document.getElementById('nickname').value.trim() || '익명';
  const comment = document.getElementById('comment').value.trim() || '성공했습니다!';
  
  const badWords = ["바보", "멍청이", "욕설단어1", "욕설단어2"]; 
  for (let word of badWords) {
    if (nickname.includes(word) || comment.includes(word)) {
      alert("부적절한 단어가 포함되어 있어 등록할 수 없습니다.");
      return;
    }
  }
  
  try {
    btn.disabled = true;
    btn.textContent = "등록 중...";

    await window.addDoc(window.collection(window.db, "numberConnectRecords"), {
      nickname: nickname,
      comment: comment,
      timeLeft: timeLeft,
      topPercent: currentTopPercent,
      createdAt: Date.now()
    });

    successForm.classList.add('hidden');
    resultMsg.innerHTML = "🏆 명예의 전당에 기록이 등록되었습니다!";
    loadRecordsFromServer();
  } catch (error) {
    console.error("등록 실패: ", error);
    btn.disabled = false;
    btn.textContent = "기록 등록하기";
    alert("기록 저장 중 오류가 발생했습니다.");
  }
}

async function loadRecordsFromServer() {
  try {
    const q = window.query(
      window.collection(window.db, "numberConnectRecords"), 
      window.orderBy("createdAt", "desc"), 
      window.limit(30)
    );
    
    const querySnapshot = await window.getDocs(q);
    
    if (querySnapshot.empty) {
      recordsList.innerHTML = '등록된 기록이 없습니다.<br> 성공하여 첫 댓글을 남겨보세요!';
      return;
    }

    let htmlBuffer = "";
    querySnapshot.forEach((doc) => {
      const item = doc.data();
      const dateFormatted = new Date(item.createdAt).toLocaleString('ko-KR', { hour12: false });
      
      htmlBuffer += `
        <div class="record_item">
          <strong>${item.nickname}</strong>: ${item.comment}
          <div class="record_meta">⏱️ 남은 시간: ${item.timeLeft}초 (상위 ${item.topPercent}%) | 📅 ${dateFormatted}</div>
        </div>
      `;
    });
    
    recordsList.innerHTML = htmlBuffer;
  } catch (error) {
    console.error("데이터 불러오기 실패: ", error);
    recordsList.innerHTML = "기록을 불러오는 중 오류가 발생했습니다. Firebase 설정을 확인해 주세요.";
  }
}

setTimeout(() => {
  loadRecordsFromServer();
}, 800);

startGame();
</script>
